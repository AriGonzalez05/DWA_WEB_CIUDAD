<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>東京 · Tokio</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body data-page="home">
    <nav id="mainNav"></nav>
    <div id="mobileMenu" class="mobile-menu"></div>
    <div id="overlayBg" class="overlay-bg"></div>

    <section class="hero">
      <div class="hero-intro">
        <p class="body-text">
          Una ciudad que respira ritmo, belleza y movimiento, capaz<br />
          de sorprenderte incluso cuando crees haberla entendido.
        </p>
        <p class="body-text hero-tagline">Tokio no se visita: se vive.</p>
      </div>

      <div class="hero-kanjis" aria-hidden="true">
        <span>東</span>
        <span>京</span>
        <span>東</span>
      </div>

      <div class="hero-carousel">
        <div class="carousel-track" id="carouselTrack">
          <img src="media/TOKYO-7.webp" alt="Tokio 7" />
          <img
            src="https://images.unsplash.com/photo-1513407030348-c983a97b98d8?w=1200&q=80"
            alt="Asakusa"
          />
          <img src="media/TOKYO 4.webp" alt="Shibuya" />
          <img src="media/TOKYO 1.webp" alt="Tokio 1" />
          <img src="media/TOKYO 3.webp" alt="Tokio 3" />
        </div>

        <div class="hero-title-overlay">
          <span class="hero-tokio">TOKIO</span>
        </div>

        <div class="carousel-kanjis" aria-hidden="true">
          <span>東</span>
          <span>京</span>
        </div>
      </div>
    </section>

    <footer id="mainFooter"></footer>

    <script src="js/components.js"></script>
    <script src="js/carousel.js"></script>
  </body>
</html>
